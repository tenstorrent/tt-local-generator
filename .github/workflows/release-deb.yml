name: Build and publish .deb packages

on:
  release:
    types: [published]

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # required to upload assets to the release

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          # devscripts/equivs needed for mk-build-deps; devscripts also provides dch
          sudo apt-get install -y --no-install-recommends devscripts equivs fakeroot
          # Derive and install all Build-Depends from debian/control, including
          # virtual packages such as debhelper-compat (= 13)
          sudo mk-build-deps --install --remove \
            --tool "apt-get -y --no-install-recommends" debian/control

      - name: Snapshot vendored tt-inference-server
        run: |
          VENDOR_SHA="$(cat vendor/VENDOR_SHA)"
          bin/snapshot_vendor.sh --sha "$VENDOR_SHA"

      - name: Stamp debian/changelog with release version
        env:
          DEBEMAIL: software@tenstorrent.com
          DEBFULLNAME: Tenstorrent
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT="$(dpkg-parsechangelog --show-field Version)"
          if [ "$VERSION" != "$CURRENT" ]; then
            dch --newversion "${VERSION}" --distribution noble \
              "Release ${VERSION}."
          fi

      - name: Build .deb packages
        run: dpkg-buildpackage -us -uc -b

      - name: Collect .deb files
        run: |
          mkdir -p dist/
          mv ../*.deb dist/
          ls -lh dist/

      - name: Upload .deb packages to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" dist/*.deb \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
