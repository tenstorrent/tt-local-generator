name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp docs/index.html _site/
          cp -r assets _site/assets
          cp app/assets/tenstorrent.png _site/assets/tenstorrent.png
          mkdir -p _site/motion_clips
          cp -r app/assets/motion_clips/gestures   _site/motion_clips/
          cp -r app/assets/motion_clips/locomotion _site/motion_clips/
          cp -r app/assets/motion_clips/reactions  _site/motion_clips/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
        id: deployment
