<!-- LORE: The Great Celestial Dragon is a revered constellation in ancient mythology, symbolizing the balance between chaos and order. According to legend, the dragon's celestial form is said to protect the heavens from the forces of darkness, while its earthly counterpart is believed to bring fertility and prosperity to the land. The dragon's twisting shape is thought to represent the cycles of nature and the eternal struggle between light and darkness. In ancient times, the appearance of the Great Celestial Dragon in the night sky was considered a harbinger of great change and transformation. -->